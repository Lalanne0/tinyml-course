version: "3.8"

services:
  mcunet:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: mcunet-course
    # Le cours se fait desormais en scripts Python (plus de JupyterLab / port 8888).
    # On se connecte au container avec `make shell`.
    volumes:
      # Exercices editables par l'apprenant (nano dans le container ou editeur hote) :
      - ../exercises:/workspace/exercises
      # Solutions en lecture seule :
      - ../solutions:/workspace/solutions:ro
      # Scripts utilitaires en lecture seule :
      - ../scripts:/workspace/scripts:ro
      # Figures generees par les exercices, recuperables sur l'hote :
      - ../outputs:/workspace/outputs
    restart: unless-stopped
